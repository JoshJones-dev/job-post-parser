<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Post Parser</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="hero">
      <p class="eyebrow">Job Application Tool</p>
      <h1>Job Post Parser</h1>
      <p class="subtitle">
        Paste multiple job URLs, parse the details, and copy everything in a clean format.
      </p>
    </section>

    <section class="panel">
      <label for="urlInput">Paste job URLs</label>
      <textarea id="urlInput" placeholder="https://company.com/job/123&#10;https://another-company.com/jobs/456"></textarea>

      <div class="actions">
        <button id="parseBtn">Parse Jobs</button>
        <button id="clearBtn" class="secondary">Clear</button>
      </div>

      <p class="hint">
        Some job sites may block automatic parsing. If that happens, the URL will still be saved and shown.
      </p>
    </section>

    <section class="panel output-panel">
      <div class="output-header">
        <h2>Results</h2>
        <button id="copyAllBtn" class="secondary">Copy All</button>
      </div>

      <div id="status" class="status">No jobs parsed yet.</div>
      <div id="results" class="results"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
