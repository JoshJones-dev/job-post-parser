<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Post Extractor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="hero">
      <h1>Job Post Extractor</h1>
      <p>Paste a job post and instantly pull the job title, salary, and location into a clean copyable format.</p>
    </section>

    <section class="grid">
      <div class="card">
        <label for="jobPost">Paste job post</label>
        <textarea id="jobPost" placeholder="Paste the full job description here..."></textarea>
        <div class="actions">
          <button id="extractBtn">Extract Info</button>
          <button id="clearBtn" class="secondary">Clear</button>
        </div>
      </div>

      <div class="card">
        <label for="output">Copy-ready output</label>
        <textarea id="output" readonly placeholder="Extracted info will appear here..."></textarea>
        <div class="actions">
          <button id="copyBtn">Copy Output</button>
        </div>
      </div>
    </section>

    <section class="card fields">
      <h2>Extracted Fields</h2>
      <div class="field-row">
        <span>Job Title</span>
        <strong id="titleField">—</strong>
      </div>
      <div class="field-row">
        <span>Salary</span>
        <strong id="salaryField">—</strong>
      </div>
      <div class="field-row">
        <span>Location</span>
        <strong id="locationField">—</strong>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
